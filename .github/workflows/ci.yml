name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov anyio httpx fastapi

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest --cov=api --cov=indexing --cov=ingestion --cov=observability --cov=reasoning --cov=retrieval --cov=graphs --cov-report=term
