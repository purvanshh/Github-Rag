<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity — Codebase Intelligence Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg-base: #09090b;
      --bg-surface: #18181b;
      --bg-surface-glow: #27272a;
      --accent: hsl(263, 70%, 50%);
      --accent-glow: hsl(263, 70%, 65%);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --radius: 12px;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-sans);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      flex: 1;
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-box {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    input, select, button {
      background-color: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-glow);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    input {
      flex: 1;
    }

    button {
      background-color: var(--accent);
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background-color: var(--accent-glow);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
    }

    .answer-terminal {
      background-color: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      flex: 1;
      min-height: 350px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      position: relative;
    }

    .token-cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background-color: var(--accent-glow);
      animation: blink 0.8s infinite;
      margin-left: 2px;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .diagram-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      background-color: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: var(--bg-surface-glow);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }

    .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-glow);
      font-family: var(--font-mono);
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      background-color: var(--bg-surface-glow);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <header>
    <h1>Antigravity RAG Dashboard</h1>
    <div id="connection-status" class="badge">API: Disconnected</div>
  </header>

  <main class="container">
    <div class="card">
      <div class="card-title">
        <span>Query Console</span>
        <span class="badge" id="model-indicator">Model: OpenAI</span>
      </div>
      <div class="search-box">
        <input type="text" id="query-input" placeholder="Ask a question about the repository (e.g. 'How does routing work?')...">
        <button id="ask-btn">Ask</button>
      </div>
      <div class="answer-terminal" id="answer-box">System initialized. Type a query above to start...<span class="token-cursor"></span></div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Architecture Visualizer</span>
        <select id="diagram-select">
          <option value="dependency">Dependency Chart</option>
          <option value="class">Class Hierarchy</option>
          <option value="sequence">Sequence Diagram</option>
        </select>
      </div>
      <div class="diagram-panel" id="diagram-box">
        <div class="mermaid" id="mermaid-render">
          graph TD
            A[Query Engine] --> B[Knowledge Graph]
            B --> C[Vector Store]
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-connected">0</div>
          <div class="stat-label">Most Connected Files</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-called">0</div>
          <div class="stat-label">Most Called Functions</div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
