apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-rag-api
  labels:
    app: github-rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-rag-api
  template:
    metadata:
      labels:
        app: github-rag-api
    spec:
      containers:
      - name: api
        image: github-rag-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8000"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
